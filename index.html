<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Website</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    background-image: url("https://images.unsplash.com/photo-1532153259564-a5f24f261f51?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"); 
    color: #ffffff;
    overflow: auto;
}
.courses-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    text-align: center;
	text-decoration: none;
}

.course-box {
    position: relative;
    width: 250px;
    height: 150px;
    border-radius: 10px;
    overflow: hidden;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    background-size: cover;
    background-position: center;
    transition: transform 0.3s, box-shadow 0.3s;
}

.course-box:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
}

.course-title {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background-color: rgba(0, 0, 0, 0.6);
    padding: 10px;
    border-radius: 5px;
}

#navbar {
    width: 100%;
    background-color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 10px 20px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
}

#logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-right: auto;
    cursor: pointer;
    text-align: center;
}

#logo-icon {
    font-size: 28px;
    font-weight: bold;
    color: #ff9500;
    background-color: #333;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
    margin-bottom: 5px;
}

#logo-text {
    font-size: 15px;
    font-weight: bold;
    color: #ff9500;
    text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.5);
}

#navbar a {
    color: #ffffff;
    text-decoration: none;
    margin-right: 20px;
    font-size: 18px;
}

#navbar input {
    padding: 5px;
    border-radius: 5px;
    border: 1px solid #ff9500;
    margin-left: auto;
    width: 200px;
    outline: none;
}

#button {
    background-color: #ff9500;
    color: #ffffff;
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 5px;
    transition: background-color 0.3s ease;
}

#button:hover {
    background-color: #ffa726;
}


#content-wrapper {
    width: 100%;
    overflow-y: auto;
    margin-top: 80px; 
    margin-bottom: 100px; 
    padding: 20px;
}

#quiz-section {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 40px 20px;
    max-width: 1200px;
    justify-content: center;
    margin: 0 auto;
}

.quiz-box {
    width: 180px;
    height: 180px;
    background-color: #333;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: bold;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
    background: linear-gradient(145deg, #333, #444);
    margin: 30px;
	text-decoration: none;
}

.quiz-box:hover {
    transform: scale(1.1);
    background-color: #f9a825;
    color: #c3adad;
    box-shadow: 0 12px 24px rgba(0, 0, 0, 0.5);
}

footer {
    width: 100%;
    background-color: #111;
    color: #ffffff;
    text-align: center;
    padding: 20px;
    
    box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.3);
}

footer h2 {
    font-size: 14px;
    margin-bottom: 15px;
}

#language, #country {
    background-color: #333;
    color: #f9a825;
    padding: 5px;
    border: 1px solid #f9a825;
    border-radius: 5px;
    margin: 10px;
    outline: none;
}

#language:hover, #country:hover {
    background-color: #444;
}
